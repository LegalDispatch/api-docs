name: Merge Specs

on:
  workflow_dispatch:
  push:
    branches: [main, staging, dev]
    paths:
      - "specs/**"

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install redocly
        run: npm install -g @redocly/cli

      - name: Install Python YAML
        run: pip install pyyaml

      - name: Run merge script
        run: |
          chmod +x scripts/merge-specs.sh
          ./scripts/merge-specs.sh

      - name: Validate merged spec
        run: |
          chmod +x scripts/validate-spec.sh
          ./scripts/validate-spec.sh merged/

      - name: Commit merged spec
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add merged/openapi.yaml
          if git diff --cached --quiet; then
            echo "No changes to merged spec"
          else
            git commit -m "chore: regenerate merged openapi.yaml [skip ci]"
            git push
          fi
