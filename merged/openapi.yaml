    UpdateSOPPricingRequest:
      type: object
      description: Request body for updating SOP (Service of Process) pricing configuration
        including strategy selection.
      required:
      - national_base_fee
      - national_mileage_rate
      - rush_premium
      - same_day_premium
      - emergency_premium
      - transfer_acceptance_fee
      - pricing_strategy
      - coverage_mode
      - urgency_premium_mode
      properties:
        pricing_strategy:
          type: string
          description: Which pricing calculation model to use.
          enum:
          - flat_per_location
          - flat_plus_mileage
          - per_party
          - tiered_flat
          default: flat_per_location
          example: flat_per_location
        coverage_mode:
          type: string
          description: Whether to serve all locations or only those with explicit
            rules.
          enum:
          - national
          - location_rules_only
          default: national
          example: national
        national_base_fee:
          type: number
          format: double
          description: Default base fee for standard service of process.
          example: 75
        national_mileage_rate:
          type: number
          format: double
          description: Per-mile rate for distance-based surcharge.
          example: 0.65
        rush_premium:
          type: number
          format: double
          description: Additional fee for rush service (1-3 day).
          example: 25
        same_day_premium:
          type: number
          format: double
          description: Additional fee for same-day service.
          example: 50
        emergency_premium:
          type: number
          format: double
          description: Additional fee for emergency/after-hours service.
          example: 100
        transfer_acceptance_fee:
          type: number
          format: double
          description: Fee charged when accepting a transfer from another partner.
          example: 15
        reference_latitude:
          type:
          - number
          - 'null'
          format: double
          description: Latitude of partner's mileage reference point. Required for
            flat_plus_mileage strategy.
          example: 34.0522
        reference_longitude:
          type:
          - number
          - 'null'
          format: double
          description: Longitude of partner's mileage reference point. Required for
            flat_plus_mileage strategy.
          example: -118.2437
        included_miles:
          type: number
          format: double
          description: Miles included in base fee before mileage charges apply.
          default: 0
          example: 15
        urgency_premium_mode:
          type: string
          description: Whether urgency premium is charged per-order or per-party.
          enum:
          - per_order
          - per_party
          default: per_order
          example: per_order
    CreateLocationRuleRequest:
      type: object
      description: Request body for creating a location-specific SOP pricing rule.
      required:
      - scope
      - scope_value
      - state
      - base_fee
      properties:
        scope:
          type: string
          description: Geographic scope level of the rule.
          enum:
          - state
          - county
          - city
          - zip
          example: county
        scope_value:
          type: string
          description: Value matching the scope (e.g. county name, zip code).
          example: Los Angeles
        state:
          type: string
          description: Two-letter US state code.
          example: CA
        base_fee:
          type: number
          format: double
          description: Base fee override for this location.
          example: 95
        mileage_rate:
          type:
          - number
          - 'null'
          format: double
          description: Mileage rate override for this location. Null means use default.
          example: 0.75
        per_party_rate:
          type:
          - number
          - 'null'
          format: double
          description: Per-party rate for this location. Used by per_party strategy.
          example: 55
        tier_label:
          type:
          - string
          - 'null'
          description: Pricing tier display name (e.g. "Metro", "Suburban"). Used
            by tiered_flat strategy.
          example: Metro
        description:
          type:
          - string
          - 'null'
          description: Human-readable note about why this rule exists.
          example: Higher fee for LA County due to traffic conditions
    CreateCustomStatusRequest:
      type: object
      description: Request body for creating a partner-specific custom attempt status.
      required:
