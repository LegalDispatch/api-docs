        token.'
    ValidateInviteTokenResponse:
      type: object
      properties:
        valid:
          type: boolean
          description: Whether the token is valid and usable.
        invitation_id:
          type:
          - 'null'
          - string
          description: Invitation record identifier (UUID); null when bool ValidateInviteTokenResponse.Valid
            is `false`.
        email:
          type:
          - 'null'
          - string
          description: Email address the invitation was sent to; null when invalid.
        partner_id:
          type:
          - 'null'
          - string
          description: Partner the user is being invited to (UUID); null when invalid.
        role:
          type:
          - 'null'
          - string
          description: Role assigned to the invitation (e.g., `dispatcher`); null
            when invalid.
        invitation_type:
          type:
          - 'null'
          - string
          description: Invitation type — `operations` or `server_relationship`; null
            when invalid.
        expires_at:
          type:
          - 'null'
          - string
          description: Token expiry timestamp (ISO 8601 UTC); null when invalid.
          format: date-time
        reason:
          type:
          - 'null'
          - string
          description: 'Reason the token is invalid; null when bool ValidateInviteTokenResponse.Valid
            is `true`.

            Values: `TOKEN_EXPIRED`, `TOKEN_USED`, `TOKEN_REVOKED`, `TOKEN_NOT_FOUND`.'
        expired_at:
          type:
          - 'null'
          - string
          description: When the token expired; populated only when string? ValidateInviteTokenResponse.Reason
            is `TOKEN_EXPIRED`.
          format: date-time
      description: 'Response for `POST /internal/invite-token/validate` when the token
        is valid.

        Returns the invitation metadata needed by UAS to complete registration.'
