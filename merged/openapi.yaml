        jurisdiction_type:
          type: string
          description: Type of jurisdiction for the rule.
          example: state
        jurisdiction_value:
          type: string
          description: Value for the jurisdiction (e.g. state code, county name).
          example: CA
        auto_accept:
          type: boolean
          description: Whether to auto-accept matching transfers.
        active:
          type: boolean
          description: Whether this rule is active.
        created_at:
          type: string
          format: date-time
    FilingPricing:
      type: object
      description: Global filing fee markup settings for a partner.
      properties:
        global_markup_type:
          type: string
          description: Type of markup (flat or percentage).
          enum:
          - flat
          - percentage
