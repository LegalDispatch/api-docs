        display_label:
          type: string
          description: Human-readable label.
          example: Left with Co-Worker
        maps_to_base:
          type: string
          description: Base system status this maps to.
          example: served
        next_party_status:
          type: string
          description: Status the serving party transitions to.
          example: completed
        requires_follow_up:
          type: boolean
          description: Whether this triggers a follow-up action.
        active:
          type: boolean
          description: Whether this custom status is active.
        description:
          type:
          - string
          - 'null'
          description: Explanation of when to use this status.
        created_at:
          type: string
          format: date-time
    TransferSettings:
      type: object
      description: Global transfer acceptance configuration for a partner.
      properties:
        accepts_inbound:
          type: boolean
          description: Whether this partner accepts inbound transfers.
        transfer_acceptance_fee:
          type: number
          format: double
          description: Fee charged per accepted transfer.
          example: 15
        max_inbound_per_day:
          type:
          - integer
          - 'null'
          description: Maximum inbound transfers per day. Null means unlimited.
          example: 50
    AutoAcceptRule:
      type: object
      description: Rule defining when a partner automatically accepts inbound transfers.
      properties:
        rule_id:
          type: string
          format: uuid
          description: Unique rule identifier.
        from_partner_id:
          type:
          - string
          - 'null'
