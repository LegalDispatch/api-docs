    FilingCourtOverride:
      type: object
      description: Court-specific filing fee markup override.
      properties:
        id:
          type: string
          format: uuid
        court_id:
          type: string
          description: Court identifier.
          example: CA-LA-SUP
        markup_type:
          type: string
          description: Override markup type.
          enum:
          - flat
          - percentage
        markup_value:
          type: number
          format: double
          description: Override markup amount.
        preferred_filing_method:
          type:
          - string
          - 'null'
          description: Preferred filing method for this court.
          enum:
          - efiling
          - physical
        description:
          type:
          - string
          - 'null'
          description: Note about this override.
        created_at:
          type: string
          format: date-time
    FeeLineItem:
