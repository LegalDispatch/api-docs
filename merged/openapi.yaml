        maps_to_base:
          type: string
          description: Base system status this custom status maps to.
          example: served
        next_party_status:
          type: string
          description: Status the serving party transitions to after this result.
          example: completed
        requires_follow_up:
          type: boolean
          description: Whether this status triggers a follow-up action.
          default: false
          example: false
        description:
          type:
          - string
          - 'null'
          description: Optional explanation of when to use this status.
