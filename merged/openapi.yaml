  /admin/v1/partners:
    servers:
    - url: http://localhost:8090
      description: Local development
    get:
      tags:
      - Partners (Admin)
      summary: List partners
      description: 'Returns a paginated list of partners with optional status filtering,
        search, and invitation enrichment.

        When `include=invitation` is set, each partner object includes an `invitation`
        field (null if no invitation exists).

        Invitation data is fetched best-effort from UAS — if UAS is unreachable, partners
        are returned with `invitation: null`.

        '
      operationId: pms_listPartners
      security:
      - bearerAuth: []
      parameters:
      - name: status
        in: query
        schema:
          type: string
          enum:
          - pending_setup
          - active
          - suspended
          - deactivated
        description: Filter by partner status
      - name: search
        in: query
        schema:
          type: string
        description: Case-insensitive search on legal_name, primary_contact_name,
          primary_contact_email
      - name: page
        in: query
        schema:
          type: integer
          default: 1
          minimum: 1
        description: Page number (1-based)
      - name: per_page
        in: query
        schema:
          type: integer
          default: 20
          minimum: 1
          maximum: 100
        description: Items per page (max 100)
      - name: include
        in: query
        schema:
          type: string
        description: 'Comma-separated enrichments. Supported: invitation'
      responses:
        '200':
          description: Paginated partner list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListPartnersResponse'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
      - Partners (Admin)
      summary: Create a new partner
      description: Creates a new partner organization and initialises its onboarding
        checklist.
      operationId: pms_createPartner
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePartnerRequest'
      responses:
        '201':
          description: Partner created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatePartnerResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Invalid partner type or subscription plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/v1/partners/{partnerID}/status:
    servers:
    - url: http://localhost:8090
      description: Local development
    patch:
      tags:
      - Partners (Admin)
      summary: Update partner status
      description: Transitions a partner to a new lifecycle status with an audit reason.
