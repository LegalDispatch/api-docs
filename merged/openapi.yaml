  /api/v1/service-requests:
    servers: []
    get:
      tags:
      - Service of Process
      summary: List service requests
      description: 'Returns a paginated list of service requests for the authenticated
        user''s partner.

        Supports filtering by **status**, free-text **search** (order number, case
        number),

        sorting, and pagination.


        ### Query Parameters

        - `status` — filter by status (e.g., `draft`, `submitted`, `in_progress`)

        - `search` — free-text search across order number and case number

        - `sort_by` — column to sort by (default: `created_at`)

        - `sort_direction` — `asc` or `desc` (default: `desc`)

        - `page` — page number, 1-based (default: `1`)

        - `page_size` — items per page, 1–100 (default: `25`)'
      operationId: sop_ListServiceRequests
      parameters:
      - name: status
        in: query
        schema:
          type: string
      - name: search
        in: query
        schema:
          type: string
      - name: sort_by
        in: query
        schema:
          type: string
      - name: sort_direction
        in: query
        schema:
          type: string
      - name: page
        in: query
        schema:
          pattern: ^-?(?:0|[1-9]\d*)$
          type:
          - integer
          - string
          format: int32
      - name: page_size
        in: query
        schema:
          pattern: ^-?(?:0|[1-9]\d*)$
          type:
          - integer
          - string
          format: int32
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponseOfServiceRequestResponse'
        '401':
          description: Unauthorized
    post:
      tags:
      - Service of Process
      summary: Create a new service request
      description: 'Creates a new service request in **draft** status. The request
        may include

        parties and locations inline. Fee calculation is performed immediately via
        PMS.


        Set `client_id` to create an order on behalf of a client.'
      operationId: sop_CreateServiceRequest
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateServiceRequestRequest'
        required: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceRequestResponse'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '422':
          description: Unprocessable Entity
  /api/v1/service-requests/{id}:
    servers: []
    get:
      tags:
      - Service of Process
      summary: Get service request details
      description: 'Returns a single service request with full details including parties,

        locations, fee line items, and attempt summaries.'
      operationId: sop_GetServiceRequest
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceRequestResponse'
        '401':
          description: Unauthorized
        '404':
          description: Not Found
  /api/v1/service-requests/{id}/submit:
    servers: []
    post:
      tags:
      - Service of Process
      summary: Submit a draft service request
      description: 'Submits a **draft** service request. This triggers:

        1. Completeness validation (parties, locations, documents)

        2. Payment hold placement via Payment Service

        3. Work order creation in Operations Service

        4. Status transition to `submitted` (or `fee_review` if partner requires)


        The `payment_method_id` identifies the payment source for the hold.'
      operationId: sop_SubmitServiceRequest
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitServiceRequestRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceRequestResponse'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '402':
          description: Payment Required
        '404':
          description: Not Found
        '409':
          description: Conflict
        '422':
          description: Unprocessable Entity
  /api/v1/service-requests/{id}/cancel:
    servers: []
    post:
      tags:
      - Service of Process
      summary: Cancel a service request
      description: 'Cancels a service request. Only allowed for orders in a pre-`in_progress`
        status

        (`draft`, `fee_review`, `submitted`, `assigned`).


        Cancellation releases any payment hold and cancels the Operations work order
        if one exists.'
      operationId: sop_CancelServiceRequest
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelServiceRequestRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: {}
        '401':
          description: Unauthorized
        '404':
          description: Not Found
        '409':
          description: Conflict
  /api/v1/service-requests/{id}/transfer:
    servers: []
    post:
      tags:
      - Service of Process
      summary: Initiate a partner transfer
      description: 'Initiates a transfer of the service request to another partner.

        The target partner''s acceptance is checked via PMS before the transfer is
        created.


        Only allowed for orders in `submitted` status. The order transitions to `pending_transfer`

        until the target partner accepts or rejects.'
      operationId: sop_InitiateTransfer
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitiateTransferRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferResponse'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
        '409':
          description: Conflict
  /api/v1/service-requests/{id}/accept-transfer:
    servers: []
    post:
      tags:
      - Service of Process
      summary: Accept or reject a transfer
      description: "The receiving partner accepts or rejects a pending transfer.\n\
        \n- **Accept**: Order ownership transfers, fees are recalculated, and the\
        \ work order\n  is re-created under the new partner.\n- **Reject**: The transfer\
        \ is cancelled, the order reverts to `submitted` status\n  under the original\
        \ partner, and a refund is issued.\n\nThe `decision` field must be `accept`\
        \ or `reject`. When rejecting,\n`rejection_reason` should be provided."
      operationId: sop_AcceptOrRejectTransfer
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptTransferRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransferResponse'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
        '409':
          description: Conflict
  /api/v1/service-requests/{id}/additional-fees:
    servers: []
    post:
      tags:
      - Service of Process
      summary: Add an additional fee
      description: 'Adds an additional fee to a service request that is in `submitted`,
        `assigned`,

        `dispatched`, or `in_progress` status.


        If `charge_immediately` is `true`, the fee is charged via Payment Service
        immediately.

        Otherwise, the fee is tracked and charged upon order completion.


        Fee types: `mileage`, `wait_time`, `rush`, `after_hours`, `stakeout`, `skip_trace`,
        `other`.'
      operationId: sop_AddAdditionalFee
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddAdditionalFeeRequest'
        required: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdditionalFeeResponse'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '404':
          description: Not Found
        '409':
          description: Conflict
  /api/v1/service-requests/{id}/approve-fees:
    servers: []
    post:
      tags:
      - Service of Process
      summary: Approve or adjust fees
      description: 'Approves or adjusts the fee line items for a service request in
        `fee_review` status.


        ### Actions

        - `approve` — accept all fees as-is and proceed to submission

        - `adjust` — modify specific fee line item amounts before approval


        When adjusting, provide an `adjustments` array with fee line item IDs and
        new amounts.

        The estimated fee is recalculated from the adjusted line items.

        After approval, the order transitions to `submitted`.'
      operationId: sop_ApproveFees
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
