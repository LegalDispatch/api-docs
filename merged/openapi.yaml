          - flat_plus_mileage
          - per_party
          - tiered_flat
          example: flat_per_location
        coverage_mode:
          type: string
          description: Whether to serve all locations or only those with explicit
            rules.
          enum:
          - national
          - location_rules_only
          example: national
        national_base_fee:
          type: number
          format: double
          description: Default base fee for standard service.
          example: 75
        national_mileage_rate:
          type: number
          format: double
          description: Per-mile surcharge rate.
          example: 0.65
        rush_premium:
          type: number
          format: double
          description: Rush service premium (1-3 day).
          example: 25
        same_day_premium:
          type: number
          format: double
          description: Same-day service premium.
          example: 50
        emergency_premium:
          type: number
          format: double
          description: Emergency/after-hours premium.
          example: 100
        transfer_acceptance_fee:
          type: number
          format: double
          description: Fee charged per accepted inbound transfer.
          example: 15
        reference_latitude:
          type:
          - number
          - 'null'
          format: double
          description: Latitude of partner's mileage reference point.
        reference_longitude:
          type:
          - number
          - 'null'
          format: double
          description: Longitude of partner's mileage reference point.
        included_miles:
          type: number
          format: double
          description: Miles included in base fee before mileage charges.
          example: 0
        urgency_premium_mode:
          type: string
          description: Whether urgency premium is per-order or per-party.
          enum:
          - per_order
          - per_party
          example: per_order
    SOPLocationRule:
      type: object
      description: Location-specific pricing override rule for SOP services.
      properties:
        rule_id:
          type: string
          format: uuid
          description: Unique rule identifier.
        scope:
          type: string
          description: Geographic scope level.
          enum:
          - state
          - county
          - city
          - zip
        scope_value:
          type: string
          description: Value matching the scope.
          example: Los Angeles
        state:
          type: string
          description: Two-letter US state code.
          example: CA
        base_fee:
          type: number
          format: double
          description: Base fee for this location.
        mileage_rate:
          type:
          - number
          - 'null'
          format: double
          description: Mileage rate for this location.
        per_party_rate:
          type:
          - number
          - 'null'
          format: double
          description: Per-party rate for this location (per_party strategy).
        tier_label:
          type:
          - string
          - 'null'
          description: Pricing tier display name (tiered_flat strategy).
        description:
          type:
          - string
          - 'null'
          description: Note about why this rule exists.
        active:
          type: boolean
          description: Whether the rule is currently active.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CustomStatus:
      type: object
      description: A partner-defined custom attempt result code.
      properties:
        status_id:
          type: string
          format: uuid
          description: Unique status identifier.
        result_code:
          type: string
