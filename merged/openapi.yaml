        source_ip:
          type: string
          description: IP address of the requesting client for allowlist enforcement.
      description: 'Request body for `POST /internal/validate-api-key`.

        Called by the API Gateway to authenticate requests bearing an API key.'
    ValidateApiKeyResponse:
      type: object
      properties:
        valid:
          type: boolean
          description: Whether the API key is valid and usable.
        api_key_id:
          type:
          - 'null'
          - string
          description: API key identifier (UUID); null when invalid.
        partner_id:
          type:
          - 'null'
          - string
          description: Partner that owns this key (UUID); null when invalid.
        permissions:
          type:
          - 'null'
          - array
          items:
            type: string
          description: Granted permission strings; null when invalid.
        environment:
          type:
          - 'null'
          - string
          description: Target environment (`live` or `test`); null when invalid.
        rate_limit:
          oneOf:
          - type: 'null'
          - description: Rate limit information; null when invalid.
            $ref: '#/components/schemas/ValidateApiKeyRateLimit'
        reason:
          type:
          - 'null'
          - string
          description: 'Reason the key is invalid; null when bool ValidateApiKeyResponse.Valid
            is `true`.

            Values: `KEY_NOT_FOUND`, `KEY_REVOKED`, `KEY_SUSPENDED`,

            `KEY_EXPIRED`, `IP_NOT_ALLOWED`, `PARTNER_INACTIVE`.'
        source_ip:
          type:
          - 'null'
          - string
          description: Source IP included when string? ValidateApiKeyResponse.Reason
            is `IP_NOT_ALLOWED`.
      description: 'Response for `POST /internal/validate-api-key`.

        Returns the partner context and permissions when valid, or a reason when invalid.'
    ValidateInviteTokenRequest:
      type: object
      properties:
