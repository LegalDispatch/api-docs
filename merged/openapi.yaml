        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: {}
        '401':
          description: Unauthorized
        '404':
          description: Not Found
        '409':
          description: Conflict
  /api/v1/service-requests/{id}/dispatch:
    servers: []
    post:
      tags:
      - Service of Process
      summary: Dispatch order to server
      description: 'Requests dispatch of the work order to the assigned process server.

        Delegates to Operations Service, which will send a callback when dispatch
        is confirmed.


        Optional `dispatch_method`: `email`, `app`, `sms` (default: `app`).

        Only allowed for orders in `assigned` status.'
      operationId: sop_DispatchOrder
      parameters:
      - name: id
