        global_markup_value:
          type: number
          format: double
          description: Markup amount or percentage.
          example: 10
        markup_description:
          type:
          - string
          - 'null'
          description: Human-readable description of the markup.
        waive_markup_for_fee_waiver:
          type: boolean
