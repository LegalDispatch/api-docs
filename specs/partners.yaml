            - 'null'
          format: double
          description: Mileage rate for this location.
        per_party_rate:
          type:
            - number
            - 'null'
          format: double
          description: Per-party rate for this location (per_party strategy).
        tier_label:
          type:
            - string
            - 'null'
          description: Pricing tier display name (tiered_flat strategy).
        description:
          type:
            - string
            - 'null'
          description: Note about why this rule exists.
        active:
          type: boolean
          description: Whether the rule is currently active.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CustomStatus:
