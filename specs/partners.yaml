        maps_to_base:
          type: string
          description: Base system status this maps to.
          example: served
        next_party_status:
          type: string
          description: Status the serving party transitions to.
          example: completed
        requires_follow_up:
          type: boolean
          description: Whether this triggers a follow-up action.
        active:
          type: boolean
          description: Whether this custom status is active.
        description:
          type:
            - string
            - 'null'
          description: Explanation of when to use this status.
        created_at:
          type: string
          format: date-time
