    SOPPricing:
      type: object
      description: Service of Process pricing configuration for a partner.
      properties:
        pricing_strategy:
          type: string
          description: Which pricing calculation model to use.
          enum:
            - flat_per_location
            - flat_plus_mileage
            - per_party
            - tiered_flat
          example: flat_per_location
        coverage_mode:
          type: string
          description: Whether to serve all locations or only those with explicit rules.
          enum:
            - national
            - location_rules_only
          example: national
        national_base_fee:
          type: number
          format: double
          description: Default base fee for standard service.
          example: 75
        national_mileage_rate:
          type: number
          format: double
          description: Per-mile surcharge rate.
          example: 0.65
        rush_premium:
          type: number
          format: double
          description: Rush service premium (1-3 day).
          example: 25
        same_day_premium:
          type: number
          format: double
          description: Same-day service premium.
          example: 50
        emergency_premium:
          type: number
          format: double
          description: Emergency/after-hours premium.
          example: 100
        transfer_acceptance_fee:
          type: number
          format: double
          description: Fee charged per accepted inbound transfer.
          example: 15
        reference_latitude:
          type:
            - number
            - 'null'
          format: double
          description: Latitude of partner's mileage reference point.
        reference_longitude:
          type:
            - number
            - 'null'
          format: double
          description: Longitude of partner's mileage reference point.
        included_miles:
          type: number
          format: double
          description: Miles included in base fee before mileage charges.
          example: 0
        urgency_premium_mode:
          type: string
          description: Whether urgency premium is per-order or per-party.
          enum:
            - per_order
            - per_party
          example: per_order
    SOPLocationRule:
      type: object
