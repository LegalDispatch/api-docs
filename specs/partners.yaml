    CreateCustomStatusRequest:
      type: object
      description: Request body for creating a partner-specific custom attempt status.
      required:
        - result_code
        - display_label
        - maps_to_base
        - next_party_status
      properties:
        result_code:
          type: string
          description: Unique machine-readable code for this status.
          example: LEFT_WITH_COWORKER
        display_label:
          type: string
          description: Human-readable label shown in the UI.
          example: Left with Co-Worker
        maps_to_base:
          type: string
          description: Base system status this custom status maps to.
          example: served
        next_party_status:
          type: string
          description: Status the serving party transitions to after this result.
          example: completed
        requires_follow_up:
          type: boolean
          description: Whether this status triggers a follow-up action.
          default: false
          example: false
        description:
          type:
            - string
            - 'null'
          description: Optional explanation of when to use this status.
    CustomStatus:
      type: object
      description: A partner-defined custom attempt result code.
      properties:
